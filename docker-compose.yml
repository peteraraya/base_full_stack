version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - taskflow_pgdata:/var/lib/postgresql/data

volumes:
  taskflow_pgdata:
